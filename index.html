<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serafufu Loading Screen</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Image Container -->
  <div class="bg-container">
    <img id="bg-image" class="bg-image" src="" alt="Background Image">
  </div>

  <!-- Comic / Graphic Novel Overlay Effects -->
  <div class="screen-overlay"></div>
  <div class="vignette"></div>
  <div class="bottom-overlay"></div>

  <!-- Loading Indicator Widget -->
  <div class="loading-wrapper">
    <span class="loading-text">loading</span>
    <span class="dot dot-1">.</span>
    <span class="dot dot-2">.</span>
    <span class="dot dot-3">.</span>
    <span class="chibi-wrapper">
      <img id="chibi-img" class="chibi-img" src="" alt="Chibi Sera">
    </span>
  </div>

  <!-- Javascript Logic Files -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
